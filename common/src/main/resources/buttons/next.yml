# Settings related to the crate i.e. things like the display item.
button:
  # Display related settings i.e. the look of the item.
  display:
    # If the prize should be enabled, or not.
    enabled: true
    # The item configuration.
    item:
      # The item material.
      material: "feather"
      # The name of the item.
      name: "<red>Next Page"
      # The lore of the item.
      lore: []
      # The amount to display.
      amount: 1
  # The action to execute on the button, i.e. going to the next page.
  action: next_page
  # The commands to execute when an item is clicked.
  commands: []
  # The commands to execute when an item is clicked.
  messages: []