# The default crate example.
crate:
  # The crate type.
  type: "CSGO"
  # The sound settings.
  sound:
    # The click sound.
    click-sound:
      # Should we send a sound?
      toggle: true
      # The type of sound to play.
      value: "ui.button.click"
      # The sound volume.
      volume: 1.0
      # The sound pitch i.e. direction
      pitch: 1.0
    # The cycle sound during animation.
    cycle-sound:
      # Should we send a sound?
      toggle: false
      # The type of sound to play.
      value: "ui.button.click"
      # The sound volume.
      volume: 1.0
      # The sound pitch i.e. direction
      pitch: 1.0
    # The stop sound when an animation ends.
    stop-sound:
      # Should we send a sound?
      toggle: false
      # The type of sound to play.
      value: "ui.button.click"
      # The sound volume.
      volume: 1.0
      # The sound pitch i.e. direction
      pitch: 1.0
  # The display item for /crates.
  display:
    # Should the item be displayed in /crates?
    enabled: true
    # The slot of the item in /crates
    slot: 13
    # The item configuration.
    item:
      # The item material.
      material: "ender_chest"
      # The name of the item.
      name: "<yellow>Default Crate"
      # The amount the item has.
      amount: 3
  gui:
    # The name of the gui.
    name: "<yellow>Default Crate"
    # The size of the gui. Each row is 9 slots, so 3*9=27
    rows: 3
  # The prizes section.
  prizes:
    # The name of the prize.
    "1":
      # The names of the files, excluding the extension found in the prizes' folder.
      # A list of commonly shared prizes.
      keys:
        - "default"
      # The max amount of times this prize can be won.
      max-pulls: 10
      # The prize weight.
      weight: 25.0